<!-- 문서의 유형 -->
<!DOCTYPE html>
<!-- html 문서의 시작-끝 표시 -->
<html lang="ko">
    <!-- html 문서의 각종 정보, 스크립트 스타일 시트 선언 -->
    <head>
        <!-- 인코딩 방식 -->
        <meta charset="UTF-8">
        <!-- 접속 기기 맞춰서 확대/축소하는 설정 -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- 현재 문서에 대한 설명 -->
        <meta name="description", content="HTML 구조와 관련된 태그 설명">
        <meta name="keywords", content="beyond, 한화시스템">
        <title>글자 관련 태그</title>
    </head>
    <!-- 실제 브라우저에서 출력되어 보여주는 내용 -->
    <body>
        <h1>글자 관련 태그</h1>
        <hr>
        안녕하세요<br>
        저는 홍길동입니다
        
        <h2>헤드라인</h2>

        <h1>h1 태그입니다</h1>
        <h2>h2 태그입니다</h2>
        <h3>h3 태그입니다</h3>
        <h4>h4 태그입니다</h4>
        <h5>h5 태그입니다</h5>
        <h6>h6 태그입니다</h6>
        일반 태그입니다


        <p>단락<!-- 특수문자 --> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;1</p>
        <p>단락2</p>
        
        <!-- 입력한 대로(탭 포함) 출력 -->
        <pre>
            안녕하세요
            저는 홍길동입니다
            만나서               반갑습니다
        </pre>
        
        <!-- 글꼴 관련 태그 -->
        
        일반<br>
        <b>강조표시(b)</b>
        <strong>강조표시(strong)</strong><br>
        <i>이탤릭체(i)</i>
        <em>이탤릭체(em)</em><br>
        <u>밑줄태그</u><br>
        <s>취소선</s><br>

        
        <br><br><br><br><br><br>
        <br><br><br><br><br><br>
        <br><br><br><br><br><br>
        <br><br><br><br><br><br>
        <br><br><br><br><br><br>
    </body>
</html>
